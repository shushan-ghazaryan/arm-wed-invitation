<style>
body {
  margin: 0;
  background: #6d1a0f;
  font-family: sans-serif;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://i.imgur.com/8Km9tLL.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* DARK OVERLAY */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

/* CURVED TEXT */
.curved-text {
  position: absolute;
  top: 60px;
  width: 100%;
  text-align: center;
}

.curved-text svg {
  width: 90%;
  height: 200px;
}

.curved-text text {
  fill: #EDECE1;
  font-size: 28px;
  letter-spacing: 2px;
}

/* CENTER CONTENT */
.center-content {
  position: relative;
  z-index: 2;
  text-align: center;
  color: #EDECE1;
}

.names {
  font-size: 42px;
  margin-top: 20px;
}

.rings {
  font-size: 50px;
  margin: 20px 0;
}

/* SCROLL DOWN */
.scroll {
  position: absolute;
  bottom: 20px;
  color: #EDECE1;
  font-size: 14px;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}
</style>

<div class="hero">

  <!-- CURVED TEXT -->
  <div class="curved-text">
    <svg viewBox="0 0 500 200">
      <path id="curve" d="M50,150 Q250,0 450,150" fill="transparent"/>
      <text>
        <textPath href="#curve" startOffset="50%" text-anchor="middle">
          Երջանիկ օր ենք նշում միասին
        </textPath>
      </text>
    </svg>
  </div>

  <!-- CENTER -->
  <div class="center-content">
    <div class="rings">💍</div>
    <div class="names">Անի & Արման</div>
  </div>

  <div class="scroll">↓ Scroll ↓</div>

</div>
